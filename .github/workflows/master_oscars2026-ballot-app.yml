# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - oscars2026-ballot-app

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: dotnet publish
        run: dotnet publish -c Release -o published

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: published

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Show published files (for debugging)
        run: ls -la published || true

      - name: Set up .NET Core (deploy runner)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install dotnet-ef tool
        run: |
          dotnet tool install --global dotnet-ef --version 10.*
          echo "::add-path::${HOME}/.dotnet/tools"
        env:
          DOTNET_ROOT: /usr/share/dotnet

      - name: Run EF Core migrations (Supabase)
        env:
          SUPABASE_PG_CONNECTION_STRING: ${{ secrets.SUPABASE_PG_CONNECTION_STRING }}
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet ef database update --connection "$SUPABASE_PG_CONNECTION_STRING" --context AppDbContext

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_ABAE17380E314E08A1ABC828008130AF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_BC78BDD5B76445A78A6D7124FB613488 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_02BA3110DD62416F883E5BA410C0F2CE }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'oscars2026-ballot-app'
          slot-name: 'Production'
          package: published
